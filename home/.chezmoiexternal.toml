[".tmux/plugins/tpm"]
  type = "git-repo"
  url = "https://github.com/tmux-plugins/tpm.git"
  refreshPeriod = "168h"   # optional, weekly refresh
[".zsh/zsh-syntax-highlighting"]
  type = "git-repo"
  url = "https://github.com/zsh-users/zsh-syntax-highlighting.git"
  refreshPeriod = "168h"
[".zsh/zsh-autosuggestions"]
  type = "git-repo"
  url = "https://github.com/zsh-users/zsh-autosuggestions.git"
  refreshPeriod = "168h"
[".local/bin/kind"]
  type = "file"
  url = "https://kind.sigs.k8s.io/dl/v0.32.0/kind-darwin-arm64"
  refreshPeriod = "168h"
  executable = true
